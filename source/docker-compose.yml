services:
  simulator:
    image: seismic-signal-simulator:multiarch_v1
    container_name: seismic-simulator
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16
    container_name: seismic-postgres
    environment:
      POSTGRES_DB: seismicdb
      POSTGRES_USER: seismic_user
      POSTGRES_PASSWORD: seismic_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seismic_user -d seismicdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  processing-1:
    build:
      context: ./processing-service
    container_name: processing-1
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: seismicdb
      DB_USER: seismic_user
      DB_PASSWORD: seismic_password
      REPLICA_ID: processing-1
      SAMPLING_RATE_HZ: 20.0
      WINDOW_SIZE_SECONDS: 5
      MIN_CLASSIFIABLE_FREQUENCY_HZ: 0.5
      LOG_NON_EVENT_WINDOWS: "false"
      SIMULATOR_CONTROL_URL: http://simulator:8080/api/control
    ports:
      - "8101:8100"
    depends_on:
      postgres:
        condition: service_healthy
      simulator:
        condition: service_started

  processing-2:
    build:
      context: ./processing-service
    container_name: processing-2
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: seismicdb
      DB_USER: seismic_user
      DB_PASSWORD: seismic_password
      REPLICA_ID: processing-2
      SAMPLING_RATE_HZ: 20.0
      WINDOW_SIZE_SECONDS: 5
      MIN_CLASSIFIABLE_FREQUENCY_HZ: 0.5
      LOG_NON_EVENT_WINDOWS: "false"
      SIMULATOR_CONTROL_URL: http://simulator:8080/api/control
    ports:
      - "8102:8100"
    depends_on:
      postgres:
        condition: service_healthy
      simulator:
        condition: service_started

  processing-3:
    build:
      context: ./processing-service
    container_name: processing-3
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: seismicdb
      DB_USER: seismic_user
      DB_PASSWORD: seismic_password
      REPLICA_ID: processing-3
      SAMPLING_RATE_HZ: 20.0
      WINDOW_SIZE_SECONDS: 5
      MIN_CLASSIFIABLE_FREQUENCY_HZ: 0.5
      LOG_NON_EVENT_WINDOWS: "true"
      SIMULATOR_CONTROL_URL: http://simulator:8080/api/control
    ports:
      - "8103:8100"
    depends_on:
      postgres:
        condition: service_healthy
      simulator:
        condition: service_started

  broker:
    build:
      context: ./broker-service
    container_name: broker-service
    environment:
      SIMULATOR_BASE_URL: http://simulator:8080
      PROCESSING_REPLICA_1: http://processing-1:8100
      PROCESSING_REPLICA_2: http://processing-2:8100
      PROCESSING_REPLICA_3: http://processing-3:8100
    ports:
      - "8001:8001"
    depends_on:
      simulator:
        condition: service_started
      processing-1:
        condition: service_started
      processing-2:
        condition: service_started
      processing-3:
        condition: service_started

  gateway:          
    build:
      context: ./gateway-service
    container_name: gateway-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: seismicdb
      DB_USER: seismic_user
      DB_PASSWORD: seismic_password
      PROCESSING_REPLICA_1: http://processing-1:8100
      PROCESSING_REPLICA_2: http://processing-2:8100
      PROCESSING_REPLICA_3: http://processing-3:8100
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-dashboard
    container_name: frontend-dashboard
    ports:
      - "3000:3000"
    depends_on:
      gateway:
        condition: service_started

volumes:
  postgres_data: